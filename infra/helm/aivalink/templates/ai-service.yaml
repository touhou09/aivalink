{{- if .Values.aiService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ai-service
spec:
  replicas: {{ .Values.aiService.replicas }}
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      {{- with .Values.aiService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ai-service
          image: {{ .Values.aiService.image }}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ .Values.aiService.llmApiSecret | default "llm-api-keys" }}
                optional: true
          resources:
            {{- toYaml .Values.aiService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.aiService.probes.readiness.path }}
              port: {{ .Values.aiService.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.aiService.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.aiService.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.aiService.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.aiService.probes.readiness.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.aiService.probes.liveness.path }}
              port: {{ .Values.aiService.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.aiService.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.aiService.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.aiService.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.aiService.probes.liveness.timeoutSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: ai-service
  ports:
    - port: {{ .Values.aiService.service.port }}
      targetPort: 8000
{{- end }}
