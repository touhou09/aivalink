{{- $ns := .Values.global.namespace }}
# Allow ingress controller to reach gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-network-policy
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from nginx ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow from web frontend (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app: web
    # Allow intra-namespace for health checks
    - from:
        - podSelector: {}
      ports:
        - port: 3000
  egress:
    # Allow to postgresql
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # Allow to redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Allow to ai-service
    - to:
        - podSelector:
            matchLabels:
              app: ai-service
      ports:
        - port: 8000
    # Allow to platform
    - to:
        - podSelector:
            matchLabels:
              app: platform
      ports:
        - port: 8080
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-network-policy
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: platform
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from nginx ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow from gateway
    - from:
        - podSelector:
            matchLabels:
              app: gateway
    # Allow intra-namespace
    - from:
        - podSelector: {}
      ports:
        - port: 8080
  egress:
    # Allow to postgresql
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # Allow to redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Allow to ai-service
    - to:
        - podSelector:
            matchLabels:
              app: ai-service
      ports:
        - port: 8000
    # Allow external HTTPS (for LLM APIs)
    - ports:
        - port: 443
          protocol: TCP
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-service-network-policy
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: ai-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from platform and gateway only
    - from:
        - podSelector:
            matchLabels:
              app: platform
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - port: 8000
  egress:
    # Allow external HTTPS (for LLM APIs)
    - ports:
        - port: 443
          protocol: TCP
    # Allow to redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-network-policy
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from nginx ingress controller only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgresql-network-policy
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from platform, gateway, and ai-service only
    - from:
        - podSelector:
            matchLabels:
              app: platform
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - port: 5432
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from platform, gateway, and ai-service only
    - from:
        - podSelector:
            matchLabels:
              app: platform
        - podSelector:
            matchLabels:
              app: gateway
        - podSelector:
            matchLabels:
              app: ai-service
      ports:
        - port: 6379
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
