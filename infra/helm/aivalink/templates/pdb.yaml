{{- if and .Values.gateway.enabled .Values.gateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app: gateway
spec:
  minAvailable: {{ .Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      app: gateway
{{- end }}
