# AivaLink Helm Chart Values

# Global settings
global:
  namespace: aivalink
  imageRegistry: ""
  imagePullSecrets: []

# PostgreSQL (pgvector)
postgresql:
  enabled: true
  image: pgvector/pgvector:pg16
  auth:
    database: aivalink
    username: aivalink
    password: aivalink123
  persistence:
    enabled: true
    size: 5Gi
  service:
    port: 5432
    nodePort: 30433
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Redis
redis:
  enabled: true
  image: redis:7-alpine
  persistence:
    enabled: false
  service:
    port: 6379
    nodePort: 30379
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# Platform API (FastAPI)
platform:
  enabled: true
  image: aivalink-platform:latest
  replicas: 2
  env:
    DATABASE_URL: "postgresql+asyncpg://aivalink:aivalink123@postgresql:5432/aivalink"
    REDIS_URL: "redis://redis:6379"
    JWT_SECRET: "your-secret-key-change-in-production"
    ORCHESTRATOR_TYPE: "k8s"
  llmApiSecret: "llm-api-keys"
  service:
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  probes:
    liveness:
      path: /health
      port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
      timeoutSeconds: 5
    readiness:
      path: /health
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 5
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - platform
            topologyKey: kubernetes.io/hostname
  tolerations: []
  nodeSelector: {}

# Gateway (Fastify WebSocket)
gateway:
  enabled: true
  image: aivalink-gateway:latest
  replicas: 2
  env:
    PORT: "3000"
    DATABASE_URL: "postgresql://aivalink:aivalink123@postgresql:5432/aivalink"
    JWT_SECRET: "your-secret-key-change-in-production"
    AI_SERVICE_URL: "http://ai-service:8000"
    GATEWAY_CHAT_MODE: "orchestrator"
    REDIS_URL: "redis://redis:6379"
    GOCLAW_URL: "http://localhost:4316"
  service:
    port: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  probes:
    liveness:
      path: /health
      port: 3000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 5
    readiness:
      path: /health
      port: 3000
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3
      timeoutSeconds: 5
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    customMetrics:
      enabled: true
      wsConnectionsTarget: 1000
  pdb:
    enabled: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - gateway
            topologyKey: kubernetes.io/hostname
  tolerations: []
  nodeSelector: {}

# GoClaw Agent Engine (sidecar)
goclaw:
  enabled: true
  image: ghcr.io/zeroclaw/goclaw:latest
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# AI Service (Python microservice)
aiService:
  enabled: true
  image: aivalink-ai-service:latest
  replicas: 1
  env: {}
  llmApiSecret: "llm-api-keys"
  service:
    port: 8000
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  probes:
    liveness:
      path: /health
      port: 8000
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 10
    readiness:
      path: /health
      port: 8000
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3
      timeoutSeconds: 10
  pdb:
    enabled: true
    minAvailable: 1
  affinity: {}
  tolerations: []
  nodeSelector: {}

# Web Frontend
web:
  enabled: true
  image: aivalink-web:latest
  replicas: 2
  service:
    port: 3000
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  probes:
    liveness:
      path: /
      port: 3000
      initialDelaySeconds: 15
      periodSeconds: 20
      failureThreshold: 3
      timeoutSeconds: 5
    readiness:
      path: /
      port: 3000
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 5
  pdb:
    enabled: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - web
            topologyKey: kubernetes.io/hostname
  tolerations: []
  nodeSelector: {}

# Nginx Ingress (internal nginx deployment, kept for backward compat)
nginx:
  enabled: true
  image: nginx:alpine
  service:
    type: NodePort
    port: 80
    nodePort: 30080

# Ingress (nginx ingress controller)
ingress:
  enabled: true
  className: nginx
  host: aivalink.example.com
  tls:
    enabled: true
    secretName: aivalink-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

# VTuber Engine Base
vtuber:
  enabled: true
  image: aivalink-vtuber:latest
  basePort: 9001
  maxInstances: 10
