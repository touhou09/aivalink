upstream platform {
    server platform:8080;
}

upstream gateway {
    server gateway:3000;
}

upstream web {
    server web:3000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # API routes -> Platform (FastAPI)
    location /api/ {
        proxy_pass http://platform/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # VTuber proxy routes -> Platform
    location /vtuber/ {
        proxy_pass http://platform/vtuber/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Gateway WebSocket -> Gateway (Fastify)
    location /gateway/ {
        proxy_pass http://gateway/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Live2D models - static files
    location /models/ {
        alias /usr/share/nginx/html/models/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket for VTuber instances (dynamic ports)
    location ~ ^/ws/vtuber/(.+)$ {
        proxy_pass http://platform/ws/vtuber/$1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Frontend - catch all
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
