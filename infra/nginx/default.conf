# Personalinker Nginx Configuration
# WebSocket 프록시 및 리버스 프록시 설정

upstream platform_api {
    server platform:8080;
}

upstream web_frontend {
    server web:3000;
}

# VTuber 인스턴스용 동적 upstream (동적 생성된 컨테이너)
# 실제 인스턴스는 Platform API의 orchestrator가 관리
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # 클라이언트 최대 요청 크기 (오디오 업로드용)
    client_max_body_size 50M;

    # API 엔드포인트
    location /api/ {
        proxy_pass http://platform_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Platform WebSocket (인스턴스 상태 등)
    location /ws/ {
        proxy_pass http://platform_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 타임아웃 (긴 연결 유지)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # VTuber 인스턴스 WebSocket 프록시 (동적 포트)
    # /vtuber/{instance_id}/client-ws -> 동적 포트로 프록시
    location ~ ^/vtuber/([^/]+)/(.*)$ {
        set $instance_id $1;
        set $vtuber_path $2;

        # Platform API에서 인스턴스 포트 조회 후 프록시
        # resolver는 Docker DNS 사용
        resolver 127.0.0.11 valid=10s;

        # 동적 인스턴스 컨테이너로 프록시
        # 컨테이너 이름 규칙: vtuber-{instance_id}
        proxy_pass http://vtuber-$instance_id:12393/$vtuber_path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # VTuber WebSocket 타임아웃
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Live2D 모델 정적 파일 서빙
    location ^~ /models/ {
        alias /usr/share/nginx/html/models/;
        autoindex off;

        # CORS 설정 (WebGPU 클라이언트용)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";

        # 캐시 설정
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # 프론트엔드 정적 파일
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vite HMR WebSocket 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Health check 엔드포인트
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
