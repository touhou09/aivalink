;; PgBouncer configuration for AivaLink
;; Mode: transaction pooling (recommended for asyncpg / SQLAlchemy)
;;
;; References:
;;   https://www.pgbouncer.org/config.html
;;   https://magicstack.github.io/asyncpg/current/usage.html#prepared-statements

[databases]
;; Route the "aivalink" logical database to the real PostgreSQL instance.
;; The host here is the Docker service name defined in docker-compose.yml.
aivalink = host=postgres port=5432 dbname=aivalink

[pgbouncer]
;; Network
listen_addr = 0.0.0.0
listen_port = 5432

;; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Pooling mode
;; transaction: connection returned to pool after each transaction —
;; safest mode for multiple stateless app servers; required when
;; statement_cache_size=0 is set on the asyncpg side.
pool_mode = transaction

;; Pool sizing
;; max_client_conn: upper bound on total frontend (app → PgBouncer) connections
max_client_conn = 200
;; default_pool_size: backend (PgBouncer → PostgreSQL) connections per database+user pair
default_pool_size = 20
;; min_pool_size: keep at least this many server connections alive
min_pool_size = 5
;; reserve_pool_size: extra connections available for bursts
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Connection limits
max_db_connections = 50
max_user_connections = 50

;; Timeouts (seconds)
server_connect_timeout = 15
server_login_retry = 15
query_timeout = 0
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60
idle_transaction_timeout = 30

;; Server lifetime
server_lifetime = 3600
server_idle_timeout = 600
server_reset_query = DISCARD ALL
server_reset_query_always = 0

;; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; Admin interface (bound to loopback only for security)
admin_users = aivalink
stats_users = aivalink

;; TLS (disabled by default; enable in production with real certs)
;; client_tls_sslmode = prefer
;; client_tls_cert_file = /etc/pgbouncer/server.crt
;; client_tls_key_file  = /etc/pgbouncer/server.key
