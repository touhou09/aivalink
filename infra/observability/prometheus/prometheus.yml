global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    metrics_path: '/ops/kpi'
    static_configs:
      - targets: ['gateway:3000']
    scrape_interval: 10s

  - job_name: 'goclaw'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['goclaw:4316']
    scrape_interval: 15s

  - job_name: 'ai-service'
    metrics_path: '/health'
    static_configs:
      - targets: ['ai-service:8000']
    scrape_interval: 30s

  - job_name: 'platform'
    metrics_path: '/health'
    static_configs:
      - targets: ['platform:8080']
    scrape_interval: 30s
