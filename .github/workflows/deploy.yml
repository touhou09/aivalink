name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aivalink

jobs:
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: platform
            context: services/platform
            dockerfile: services/platform/Dockerfile
          - name: ai-service
            context: services/ai-service
            dockerfile: services/ai-service/Dockerfile
          - name: gateway
            context: .
            dockerfile: packages/gateway/Dockerfile
          - name: web
            context: .
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy platform to staging
        run: |
          helm upgrade --install aivalink-platform infra/helm/platform \
            --namespace staging \
            --create-namespace \
            --set image.repository=${{ env.IMAGE_PREFIX }}/platform \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set environment=staging \
            --wait \
            --timeout 5m

      - name: Deploy ai-service to staging
        run: |
          helm upgrade --install aivalink-ai-service infra/helm/ai-service \
            --namespace staging \
            --create-namespace \
            --set image.repository=${{ env.IMAGE_PREFIX }}/ai-service \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set environment=staging \
            --wait \
            --timeout 5m

      - name: Deploy gateway to staging
        run: |
          helm upgrade --install aivalink-gateway infra/helm/gateway \
            --namespace staging \
            --create-namespace \
            --set image.repository=${{ env.IMAGE_PREFIX }}/gateway \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set environment=staging \
            --wait \
            --timeout 5m

      - name: Deploy web to staging
        run: |
          helm upgrade --install aivalink-web infra/helm/web \
            --namespace staging \
            --create-namespace \
            --set image.repository=${{ env.IMAGE_PREFIX }}/web \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set environment=staging \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/aivalink-platform -n staging --timeout=120s
          kubectl rollout status deployment/aivalink-ai-service -n staging --timeout=120s
          kubectl rollout status deployment/aivalink-gateway -n staging --timeout=120s
          kubectl rollout status deployment/aivalink-web -n staging --timeout=120s
